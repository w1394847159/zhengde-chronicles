name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle Build Cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: ${{ runner.os }}-build-cache-${{ hashFiles('**/*.kt', '**/*.kts', '**/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-build-cache-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhengde-chronicles-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create Release and Upload APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest --repo ${{ github.repository }} 2>/dev/null || true
          gh release upload latest app/build/outputs/apk/debug/*.apk --repo ${{ github.repository }} --clobber 2>/dev/null || \
          gh release create latest --repo ${{ github.repository }} --title "最新构建" \
            --notes "自动构建的最新 Debug APK，直接下载安装。" \
            --prerelease app/build/outputs/apk/debug/*.apk
